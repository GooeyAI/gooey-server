<div style="background: #fff7e8; border: 1px solid rgba(198, 144, 0, 0.35); border-left: 6px solid #c69000; border-radius: 10px; padding: 16px 18px; max-width: 640px;">
  <div style="display: flex; align-items: center; gap: 10px; font-weight: 650; font-size: 1.05rem; color: #2a2a2a;">
    <span style="display: inline-flex; width: 28px; height: 28px; border-radius: 8px; align-items: center; justify-content: center; background: #fff1cf; color: #9c6b00;">
      <i class="fa-regular fa-credit-card"></i>
    </span>
    <span>Paid workspace required</span>
  </div>

  <div style="margin-top: 8px; color: #4a4a4a; font-size: 0.98rem;">
    Your workflow requested paid-only model access.
  </div>

  {% if paid_only_models %}
  <div style="margin-top: 12px; color: #4a4a4a; font-size: 0.95rem;">
    <div style="font-weight: 600; margin-bottom: 6px;">Models:</div>
    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
      {% for model in paid_only_models %}
      <span style="display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; background: #111827; color: #ffffff; font-size: 0.85rem;">
        {{ model }}
      </span>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <div style="margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px;">
    <a href="/pricing/" target="_blank" style="text-decoration: none;" class="btn btn-theme btn-primary p-2 m-0">
      <i class="fa-solid fa-bolt"></i>
      View pricing
    </a>
    <a href="/account/" target="_blank" style="text-decoration: none;" class="btn btn-outline-secondary p-2 m-0">
      <i class="fa-regular fa-user"></i>
      Go to account
    </a>
  </div>

  <div style="margin-top: 10px; color: #6b6b6b; font-size: 0.9rem;">
    Need help? We’re on <a href="{{ settings.DISCORD_INVITE_URL }}" target="_blank">discord</a>.
  </div>
</div>
